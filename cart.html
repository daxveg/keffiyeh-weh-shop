<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Bag — Keffiyeh Co.</title>
<link rel="stylesheet" href="shared.css">
<style>
  .cart-layout { display:grid; grid-template-columns:1fr 380px; gap:0; min-height:calc(100vh - 80px); }
  .cart-items { padding:4rem; border-right:1px solid rgba(28,26,23,.12); }
  .page-eyebrow { font-family:'DM Mono',monospace; font-size:.65rem; letter-spacing:.3em; text-transform:uppercase; color:var(--terracotta); margin-bottom:.8rem; }
  .page-title { font-family:'Playfair Display',serif; font-size:clamp(2.5rem,4vw,4rem); font-weight:900; margin-bottom:3rem; }

  .cart-item { display:grid; grid-template-columns:120px 1fr auto; gap:1.5rem; align-items:center; padding:1.5rem 0; border-bottom:1px solid rgba(28,26,23,.1); }
  .item-pattern { width:120px; height:90px; flex-shrink:0; }
  .item-name { font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700; margin-bottom:.3rem; }
  .item-origin { font-family:'DM Mono',monospace; font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; color:var(--terracotta); margin-bottom:.8rem; }
  .item-controls { display:flex; align-items:center; gap:.5rem; }
  .qty-btn { width:28px; height:28px; background:transparent; border:1px solid rgba(28,26,23,.25); cursor:pointer; font-size:1rem; font-family:'DM Mono',monospace; transition:all .2s; color:var(--charcoal); display:flex; align-items:center; justify-content:center; }
  .qty-btn:hover { background:var(--charcoal); color:var(--cream); }
  .qty-num { font-family:'DM Mono',monospace; font-size:.85rem; width:28px; text-align:center; }
  .remove-btn { font-family:'DM Mono',monospace; font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; background:none; border:none; cursor:pointer; color:rgba(28,26,23,.4); margin-left:.5rem; transition:color .2s; }
  .remove-btn:hover { color:var(--terracotta); }
  .item-price { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; text-align:right; }

  .cart-summary { padding:4rem 3rem; background:var(--white-wash); position:sticky; top:80px; align-self:start; }
  .summary-title { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:900; margin-bottom:2rem; }
  .summary-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
  .summary-label { font-family:'DM Mono',monospace; font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; opacity:.6; }
  .summary-value { font-family:'Playfair Display',serif; font-size:1rem; }
  .summary-divider { border:none; border-top:1px solid rgba(28,26,23,.12); margin:1.5rem 0; }
  .summary-total-label { font-family:'DM Mono',monospace; font-size:.75rem; letter-spacing:.1em; text-transform:uppercase; }
  .summary-total-value { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:900; }
  .checkout-btn { display:block; width:100%; background:var(--charcoal); color:var(--cream); padding:1.2rem; font-family:'DM Mono',monospace; font-size:.75rem; letter-spacing:.15em; text-transform:uppercase; text-decoration:none; text-align:center; margin-top:1.5rem; transition:background .2s; border:none; cursor:pointer; }
  .checkout-btn:hover { background:var(--terracotta); }
  .continue-link { display:block; text-align:center; font-family:'DM Mono',monospace; font-size:.65rem; letter-spacing:.1em; text-transform:uppercase; color:var(--charcoal); text-decoration:none; margin-top:1rem; opacity:.5; transition:opacity .2s; }
  .continue-link:hover { opacity:1; }

  .empty-state { text-align:center; padding:6rem 2rem; }
  .empty-icon { font-size:3rem; margin-bottom:1.5rem; opacity:.3; }
  .empty-title { font-family:'Playfair Display',serif; font-size:2rem; font-weight:700; margin-bottom:1rem; }
  .empty-desc { font-size:.9rem; opacity:.6; margin-bottom:2rem; }

  .promo-row { display:flex; gap:0; margin-top:1.5rem; }
  .promo-input { flex:1; background:transparent; border:1px solid rgba(28,26,23,.2); border-right:none; padding:.7rem 1rem; font-family:'DM Mono',monospace; font-size:.7rem; outline:none; color:var(--charcoal); }
  .promo-input::placeholder { opacity:.4; }
  .promo-btn { background:var(--charcoal); color:var(--cream); border:none; padding:.7rem 1.2rem; font-family:'DM Mono',monospace; font-size:.65rem; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; transition:background .2s; }
  .promo-btn:hover { background:var(--terracotta); }

  @media(max-width:900px){
    .cart-layout { grid-template-columns:1fr; }
    .cart-items { padding:2rem 1.5rem; }
    .cart-summary { position:static; }
  }
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Keffiyeh Co.</a>
  <ul class="nav-links">
    <li><a href="collection.html">Collection</a></li>
    <li><a href="index.html#heritage">Heritage</a></li>
    <li><a href="cart.html" class="active">Cart</a></li>
  </ul>
  <a class="nav-cart" href="cart.html" id="cart-badge">Bag (0)</a>
</nav>

<div class="page-wrap">
  <div class="cart-layout">
    <div class="cart-items" id="cart-items-container">
      <p class="page-eyebrow">Your Selection</p>
      <h1 class="page-title">Your Bag</h1>
      <div id="items-list"></div>
    </div>
    <div class="cart-summary" id="cart-summary">
      <h2 class="summary-title">Order Summary</h2>
      <div class="summary-row">
        <span class="summary-label">Subtotal</span>
        <span class="summary-value" id="subtotal">€0</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">Shipping</span>
        <span class="summary-value" id="shipping">Calculated at checkout</span>
      </div>
      <div class="promo-row">
        <input class="promo-input" type="text" placeholder="Promo code" id="promo">
        <button class="promo-btn" onclick="applyPromo()">Apply</button>
      </div>
      <hr class="summary-divider">
      <div class="summary-row">
        <span class="summary-total-label">Total</span>
        <span class="summary-total-value" id="total">€0</span>
      </div>
      <a href="checkout.html" class="checkout-btn" id="checkout-btn">Proceed to Checkout →</a>
      <a href="collection.html" class="continue-link">← Continue Shopping</a>
    </div>
  </div>
</div>

<footer>
  <div class="footer-logo">Keffiyeh Co.</div>
  <span class="footer-copy">© 2026 Keffiyeh Co. — Handwoven with heritage.</span>
</footer>

<script src="shared.js"></script>
<script>
function renderCart() {
  const cart = getCart();
  const list = document.getElementById('items-list');
  const subtotalEl = document.getElementById('subtotal');
  const totalEl = document.getElementById('total');
  const shippingEl = document.getElementById('shipping');

  if(cart.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">◻</div>
        <h2 class="empty-title">Your bag is empty</h2>
        <p class="empty-desc">Discover our handwoven collection and add something beautiful.</p>
        <a href="collection.html" class="btn-primary">Browse Collection</a>
      </div>`;
    subtotalEl.textContent = '€0';
    totalEl.textContent = '€0';
    shippingEl.textContent = '—';
    return;
  }

  const subtotal = cartTotal();
  const shipping = subtotal >= 75 ? 'Free' : '€4.95';
  const total = subtotal + (subtotal >= 75 ? 0 : 4.95);

  list.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="item-pattern ${item.pattern}"></div>
      <div>
        <div class="item-name">${item.name}</div>
        <div class="item-origin">${item.origin}</div>
        <div class="item-controls">
          <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
          <button class="remove-btn" onclick="removeItem(${item.id})">Remove</button>
        </div>
      </div>
      <div class="item-price">€${(item.price * item.qty).toFixed(2)}</div>
    </div>
  `).join('');

  subtotalEl.textContent = `€${subtotal.toFixed(2)}`;
  shippingEl.textContent = shipping;
  totalEl.textContent = `€${total.toFixed(2)}`;
}

function changeQty(id, delta) {
  const cart = getCart();
  const item = cart.find(i => i.id === id);
  if(!item) return;
  item.qty += delta;
  if(item.qty <= 0) cart.splice(cart.indexOf(item), 1);
  saveCart(cart);
  updateCartBadge();
  renderCart();
}

function removeItem(id) {
  const cart = getCart().filter(i => i.id !== id);
  saveCart(cart);
  updateCartBadge();
  renderCart();
}

function applyPromo() {
  const code = document.getElementById('promo').value.toUpperCase();
  if(code === 'HERITAGE10') alert('10% discount applied!');
  else alert('Invalid promo code.');
}

renderCart();
updateCartBadge();
</script>
</body>
</html>
